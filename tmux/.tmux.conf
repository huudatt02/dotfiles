# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -g mode-keys vi

set -g base-index 1
set -g renumber-windows on

# Reload config
unbind r 
bind r source-file ~/.tmux.conf

# Splits
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Windows
bind c new-window -c "#{pane_current_path}"

# Pane resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

bind -r m resize-pane -Z

# Copy mode (Vim style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-line-and-cancel

bind -r e split-window -h \
  "nvim ~/Documents/notes/ideas/$(date +'%Y-%m-%d').md"

bind -r o split-window -h \
  "nvim ~/Documents/notes/todo/$(date +'%Y-%m-%d').md"

bind -r v split-window -h -c "#{pane_current_path}" "zsh -c 'nvim; exec zsh'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

# Colors
set -g @thm-bg "#2f334d"
set -g @thm-fg "#c8d3f5"
set -g @thm-overlay "#737aa2"
set -g @thm-blue "#82aaff"
set -g @thm-green "#c3e88d"
set -g @thm-magenta "#c099ff"
set -g @thm-orange "#ff966c"
set -g @thm-red "#ff757f"
set -g @thm-yellow "#ffc777"

set -g @mode_indicator_prefix_prompt ' 󰔟 wait '
set -g @mode_indicator_copy_prompt  '  copy '
set -g @mode_indicator_sync_prompt  '  sync '
set -g @mode_indicator_empty_prompt '  tmux '

set -g @mode_indicator_prefix_mode_style "bg=#{@thm-bg},fg=#{@thm-red}"
set -g @mode_indicator_copy_mode_style  "bg=#{@thm-bg},fg=#{@thm-yellow}"
set -g @mode_indicator_sync_mode_style  "bg=#{@thm-bg},fg=#{@thm-magenta}"
set -g @mode_indicator_empty_mode_style "bg=#{@thm-bg},fg=#{@thm-green}"

set -g window-status-separator "#[fg=#{@thm-overlay}]│"
set -g window-status-format " #I #W "
set -g window-status-style "bg=#{@thm-bg},fg=#{@thm-overlay}"

set -g window-status-last-style "bg=#{@thm-bg},fg=#{@thm-overlay},bold"
set -g window-status-bell-style "bg=#{@thm-red},fg=#{@thm-bg},bold"

set -g window-status-current-format " #I #W "
set -g window-status-current-style "bg=#{@thm-orange},fg=#{@thm-bg},bold"

set -g status-justify centre
set -g status-left-length 100
set -g status-right-length 100

set -g status-style "bg=default,fg=#{@thm-fg}"

set -g status-left ""
set -ga status-left "#[bg=#{@thm-bg},fg=#{@thm-magenta}]  #S "
set -ga status-left "#[fg=#{@thm-overlay}]│"
set -ga status-left "#[bg=#{@thm-bg},fg=#{@thm-blue}] 󰝰 #{b:pane_current_path} "

set -g status-right ""
set -g status-right "#{tmux_mode_indicator}"

run "$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm"
